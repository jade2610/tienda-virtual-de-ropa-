<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo salió mal - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="text-center px-3">
        <i class="bi bi-emoji-dizzy" style="font-size: 4rem; color: #B23A48;"></i>
        <h1 class="fw-bold mt-3" th:text="${status != null ? status : ''} + ' - Algo salió mal'">Algo salió mal</h1>
        <p class="text-muted">
            No pudimos completar tu solicitud. Puede ser un enlace roto o un problema temporal del servidor.
        </p>
        <a href="/" class="btn btn-dark rounded-pill px-4 mt-2">
            <i class="bi bi-house-door"></i> Volver al inicio
        </a>
    </div>
</body>
</html>
