<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <nav class="navbar bg-white shadow-sm mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" th:href="@{/catalogo}">
                <i class="bi bi-arrow-left me-2"></i> Volver al catálogo
            </a>
            <a class="nav-link text-dark fw-bold" th:href="@{/logout}">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
            </a>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 700px;">
        <h2 class="fw-bold mb-4">Mis Pedidos</h2>

        <div th:if="${#lists.isEmpty(pedidos)}" class="card border-0 shadow-sm p-5 text-center">
            <i class="bi bi-bag fs-1 text-muted mb-2"></i>
            <p class="text-muted mb-0">Todavía no tienes pedidos. ¡Anímate a comprar algo!</p>
            <a th:href="@{/catalogo}" class="btn btn-dark rounded-pill mt-3 mx-auto" style="width: fit-content;">Ver catálogo</a>
        </div>

        <div th:each="pedido : ${pedidos}" class="card border-0 shadow-sm p-4 mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fw-bold">Pedido #<span th:text="${pedido.venta.id}"></span></span>
                <span class="badge rounded-pill"
                      th:classappend="${pedido.venta.estado == 'CANCELADO'} ? 'bg-danger' : (${pedido.venta.estado == 'ENTREGADO'} ? 'bg-success' : (${pedido.venta.estado == 'ENVIADO'} ? 'bg-info text-dark' : 'bg-secondary'))"
                      th:text="${pedido.venta.estado}"></span>
            </div>
            <p class="text-muted small mb-3" th:text="${#temporals.format(pedido.venta.fecha, 'dd/MM/yyyy HH:mm')}"></p>

            <!-- Seguimiento visual del pedido -->
            <div th:if="${pedido.venta.estado == 'CANCELADO'}" class="alert alert-danger py-2 small mb-3">
                <i class="bi bi-x-circle-fill"></i> Este pedido fue cancelado.
            </div>
            <div th:unless="${pedido.venta.estado == 'CANCELADO'}" class="d-flex justify-content-between align-items-center mb-3 px-2">
                <div class="text-center flex-fill">
                    <div class="rounded-circle mx-auto d-flex align-items-center justify-content-center bg-dark text-white" style="width:28px;height:28px;"><i class="bi bi-check-lg"></i></div>
                    <small class="d-block mt-1">Confirmado</small>
                </div>
                <div class="flex-fill border-top" style="margin-top:14px;" th:classappend="${pedido.venta.estado != 'PENDIENTE'} ? 'border-dark border-2' : ''"></div>
                <div class="text-center flex-fill">
                    <div class="rounded-circle mx-auto d-flex align-items-center justify-content-center"
                         th:classappend="${pedido.venta.estado == 'ENVIADO' or pedido.venta.estado == 'ENTREGADO'} ? 'bg-dark text-white' : 'bg-light text-muted border'"
                         style="width:28px;height:28px;">
                        <i class="bi bi-truck"></i>
                    </div>
                    <small class="d-block mt-1">Enviado</small>
                </div>
                <div class="flex-fill border-top" style="margin-top:14px;" th:classappend="${pedido.venta.estado == 'ENTREGADO'} ? 'border-dark border-2' : ''"></div>
                <div class="text-center flex-fill">
                    <div class="rounded-circle mx-auto d-flex align-items-center justify-content-center"
                         th:classappend="${pedido.venta.estado == 'ENTREGADO'} ? 'bg-success text-white' : 'bg-light text-muted border'"
                         style="width:28px;height:28px;">
                        <i class="bi bi-house-check"></i>
                    </div>
                    <small class="d-block mt-1">Entregado</small>
                </div>
            </div>

            <ul class="list-group list-group-flush mb-2">
                <li class="list-group-item d-flex justify-content-between px-0" th:each="detalle : ${pedido.detalles}">
                    <span>
                        <span th:text="${detalle.producto.nombre}"></span>
                        <small class="text-muted d-block" th:text="'Talla ' + ${detalle.producto.talla} + ' × ' + ${detalle.cantidad}"></small>
                    </span>
                    <span th:text="'S/ ' + ${#numbers.formatDecimal(detalle.precioUnitario * detalle.cantidad, 1, 2)}"></span>
                </li>
            </ul>

            <div class="d-flex justify-content-between align-items-center border-top pt-2">
                <a th:href="@{'/pedido/' + ${pedido.venta.id}}" class="small text-muted text-decoration-none">
                    <i class="bi bi-qr-code"></i> Ver comprobante
                </a>
                <span class="fw-bold text-danger" th:text="'S/ ' + ${#numbers.formatDecimal(pedido.venta.total, 1, 2)}"></span>
            </div>
        </div>
    </div>

</body>
</html>
