<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card border-0 shadow-sm p-4 p-md-5" style="max-width: 420px; width: 100%; border-radius: 20px;">

        <div class="text-center mb-4">
            <h4 class="fw-bold">JVXF Boutique</h4>
            <p class="text-muted small">Recuperar contraseña</p>
        </div>

        <div th:if="${mensaje}" class="alert alert-success small py-2" th:text="${mensaje}"></div>

        <p class="text-muted small" th:unless="${mensaje}">
            Ingresa el correo de tu cuenta. Si está registrada, te enviaremos una contraseña temporal.
        </p>

        <form th:action="@{/recuperar}" method="POST">
            <div class="mb-4">
                <label class="form-label fw-bold">Correo electrónico</label>
                <input type="email" class="form-control" name="email" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 rounded-pill py-2">Enviar contraseña temporal</button>
        </form>

        <p class="text-center small mt-4 mb-0">
            <a th:href="@{/login}" class="text-muted"><i class="bi bi-arrow-left"></i> Volver al login</a>
        </p>
    </div>

</body>
</html>
