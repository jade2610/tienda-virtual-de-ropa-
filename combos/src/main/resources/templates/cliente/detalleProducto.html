<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.nombre} + ' - JVXF Boutique'">Detalle - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <style>
        .talla-btn.active { background-color: #212529; color: #fff; }
        .talla-btn:disabled { text-decoration: line-through; opacity: 0.4; }
        #imagenPrincipal { transition: opacity 0.2s ease; }
        #asistenteMensajes { scrollbar-width: thin; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar bg-white shadow-sm mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" th:href="@{/catalogo}">
                <i class="bi bi-arrow-left me-2"></i> Volver al catálogo
            </a>
            <a class="nav-link text-dark fw-bold" th:href="@{/carrito/ver}">
                <i class="bi bi-cart3 fs-4"></i> Mi Carrito
            </a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-5">

            <!-- Columna izquierda: imagen + info del producto -->
            <div class="col-lg-7">
                <div class="row g-4">
                    <div class="col-md-6">
                        <img id="imagenPrincipal" th:src="${producto.imagenUrl}" class="img-fluid rounded-4 shadow-sm w-100"
                             style="object-fit: cover; max-height: 520px;" alt="Producto">
                    </div>
                    <div class="col-md-6">
                        <div class="d-flex justify-content-between align-items-start">
                            <h1 class="fw-bold" th:text="${producto.nombre}">Nombre del producto</h1>
                            <button type="button" class="btn-favorito flex-shrink-0"
                                    style="width: 46px; height: 46px; border-radius: 50%; border: 1px solid #F0D5D7; background: #fff;"
                                    th:attr="data-producto-id=${producto.idReferencia}"
                                    th:classappend="${esFavorito} ? 'es-favorito' : ''"
                                    onclick="alternarFavoritoDetalle(this)">
                                <i class="bi" th:classappend="${esFavorito} ? 'bi-heart-fill text-danger' : 'bi-heart text-dark'"></i>
                            </button>
                        </div>
                        <p class="text-muted" th:text="${producto.description}">Descripción</p>
                        <h3 class="fw-bold text-danger mb-4" th:text="'S/ ' + ${#numbers.formatDecimal(producto.precio, 1, 2)}">S/ 0.00</h3>

                        <form id="formAgregar"
                              th:action="@{/carrito/agregar/{id}(id=${producto.primeraDisponible != null ? producto.primeraDisponible.id : producto.tallas[0].id})}"
                              method="POST">

                            <p class="fw-bold mb-2">Elige tu talla:</p>
                            <div class="d-flex flex-wrap gap-2 mb-4" id="selectorTallas">
                                <button type="button"
                                        th:each="t : ${producto.tallas}"
                                        class="btn btn-outline-dark talla-btn"
                                        th:classappend="${t.id == (producto.primeraDisponible != null ? producto.primeraDisponible.id : -1)} ? ' active' : ''"
                                        th:attr="data-id=${t.id},data-img=${t.imagenUrl},data-stock=${t.stock}"
                                        th:text="${t.talla}"
                                        th:disabled="${!t.disponible}"
                                        onclick="seleccionarTalla(this)">
                                </button>
                            </div>

                            <p id="mensajeStock" class="small text-muted mb-3"></p>

                            <button type="submit" class="btn btn-dark rounded-pill px-5 py-2"
                                    th:disabled="${producto.sinStock}" id="btnAgregar">
                                <i class="bi bi-cart-plus"></i>
                                <span th:text="${producto.sinStock} ? 'Sin stock' : 'Añadir al carrito'">Añadir al carrito</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Columna derecha: asistente integrado, con contexto del producto -->
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm rounded-4 d-flex flex-column" style="max-height: 560px;">
                    <div class="card-header bg-dark text-white rounded-top-4 py-3">
                        <i class="bi bi-robot me-2"></i> Pregúntale al asistente sobre esta prenda
                    </div>
                    <div id="asistenteMensajes" class="p-3" style="height: 320px; overflow-y:auto; background:#f8f9fa;"></div>
                    <div class="d-flex flex-wrap gap-2 px-3 pb-2">
                        <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill" onclick="preguntaRapida('¿tienen stock en todas las tallas?')">¿Stock disponible?</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill" onclick="preguntaRapida('¿cuánto cuesta?')">¿Precio?</button>
                    </div>
                    <form class="d-flex border-top" onsubmit="return enviarPregunta(event)">
                        <input id="asistenteInput" type="text" placeholder="Escribe tu pregunta..." autocomplete="off"
                               class="form-control border-0 rounded-0">
                        <button type="submit" class="btn btn-dark rounded-0">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <footer class="text-center py-4 mt-auto border-top" style="background-color: #2C1A17; color: #FCF9F2 !important;">
        <p class="mb-0">© 2026 JVXF Boutique - Todos los derechos reservados</p>
    </footer>

    <script th:inline="javascript">
        const nombreProducto = /*[[${producto.nombre}]]*/ '';
        const imagenPorDefecto = /*[[${producto.imagenUrl}]]*/ '';

        function seleccionarTalla(btn) {
            if (btn.disabled) return;
            const form = document.getElementById('formAgregar');
            document.querySelectorAll('.talla-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            form.action = form.action.replace(/\/agregar\/\d+$/, '/agregar/' + btn.dataset.id);

            const img = btn.dataset.img && btn.dataset.img !== 'null' ? btn.dataset.img : imagenPorDefecto;
            document.getElementById('imagenPrincipal').src = img;

            document.getElementById('mensajeStock').textContent = 'Quedan ' + btn.dataset.stock + ' unidades en talla ' + btn.textContent.trim() + '.';
        }

        function agregarMensaje(texto, tipo) {
            const contenedor = document.getElementById('asistenteMensajes');
            const burbuja = document.createElement('div');
            burbuja.style.margin = '6px 0';
            burbuja.style.padding = '8px 12px';
            burbuja.style.borderRadius = '12px';
            burbuja.style.maxWidth = '85%';
            burbuja.style.whiteSpace = 'pre-line';
            burbuja.style.fontSize = '14px';
            if (tipo === 'user') {
                burbuja.style.marginLeft = 'auto';
                burbuja.style.background = '#212529';
                burbuja.style.color = '#fff';
            } else {
                burbuja.style.background = '#e9ecef';
                burbuja.style.color = '#212529';
            }
            burbuja.textContent = texto;
            contenedor.appendChild(burbuja);
            contenedor.scrollTop = contenedor.scrollHeight;
        }

        function preguntarBackend(pregunta) {
            agregarMensaje(pregunta, 'user');
            fetch('/asistente/preguntar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pregunta: pregunta })
            })
            .then(res => res.json())
            .then(data => agregarMensaje(data.respuesta, 'bot'))
            .catch(() => agregarMensaje('Hubo un problema para responder tu pregunta, intenta de nuevo.', 'bot'));
        }

        function enviarPregunta(event) {
            event.preventDefault();
            const input = document.getElementById('asistenteInput');
            const pregunta = input.value.trim();
            if (!pregunta) return false;
            input.value = '';
            preguntarBackend(pregunta);
            return false;
        }

        function preguntaRapida(base) {
            preguntarBackend(nombreProducto + ': ' + base);
        }

        // Mensaje de bienvenida contextual al producto que se está viendo
        agregarMensaje('¡Hola! Estoy viendo que te interesa "' + nombreProducto + '". Pregúntame por tallas, stock o precio.', 'bot');

        function alternarFavoritoDetalle(boton) {
            const productoId = boton.getAttribute('data-producto-id');
            fetch(`/favoritos/${productoId}/alternar`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.requiereLogin) {
                        window.location.href = '/login';
                        return;
                    }
                    const icono = boton.querySelector('i');
                    if (data.favorito) {
                        boton.classList.add('es-favorito');
                        icono.classList.remove('bi-heart', 'text-dark');
                        icono.classList.add('bi-heart-fill', 'text-danger');
                    } else {
                        boton.classList.remove('es-favorito');
                        icono.classList.remove('bi-heart-fill', 'text-danger');
                        icono.classList.add('bi-heart', 'text-dark');
                    }
                })
                .catch(() => {});
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
