<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
    <style>
        /* Estilo para las tarjetas (Añade esto a tu archivo CSS o aquí) */
        .product-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.1) !important; }
        .product-card img { transition: transform 0.5s; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar bg-white shadow-sm mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" th:href="@{/}">
                <i class="bi bi-arrow-left me-2"></i> Volver al Inicio
            </a>
            <div class="d-flex align-items-center gap-3">
                <a th:if="${nombreClienteSesion}" class="nav-link text-dark small" th:href="@{/perfil}">
                    <i class="bi bi-person-circle"></i> <span th:text="${nombreClienteSesion}"></span>
                </a>
                <a th:unless="${nombreClienteSesion}" class="nav-link text-dark small" th:href="@{/login}">
                    <i class="bi bi-person"></i> Iniciar sesión
                </a>
                <a th:if="${nombreClienteSesion}" class="nav-link text-dark" th:href="@{/favoritos}" title="Mis Favoritos">
                    <i class="bi bi-heart fs-5"></i>
                </a>
                <a class="nav-link text-dark fw-bold" th:href="@{/carrito/ver}">
                    <i class="bi bi-cart3 fs-4"></i> Mi Carrito
                </a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold display-4">Nuestra Colección</h1>
            <p class="text-muted lead">Encuentra la prenda perfecta para tu estilo</p>
        </div>

        <div class="d-flex flex-wrap justify-content-center gap-3 mb-5">
            <div class="input-group shadow-sm" style="width: 260px; border-radius: 30px; overflow: hidden;">
                <span class="input-group-text bg-white border-0"><i class="bi bi-search"></i></span>
                <input type="text" id="buscadorNombre" class="form-control border-0" placeholder="Buscar por nombre..." oninput="filtrar()">
            </div>
            <select id="filtroGenero" class="form-select border-0 shadow-sm" style="width: 180px; border-radius: 30px;" onchange="filtrar()">
                <option value="todos">Género: Todos</option>
                <option value="femenino">Femenino</option>
                <option value="masculino">Masculino</option>
            </select>
            <select id="filtroTipo" class="form-select border-0 shadow-sm" style="width: 180px; border-radius: 30px;" onchange="filtrar()">
                <option value="todos">Tipo: Todos</option>
                <option value="polo">Polos</option>
                <option value="pantalon">Pantalones</option>
                <option value="casaca">Casacas</option>
                <option value="sueter">Suéteres</option>
            </select>
        </div>

        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" id="catalogoProductos">
            <div th:each="producto : ${listaProductos}" 
                 class="col producto-card" 
                 th:data-genero="${producto.genero != null ? producto.genero.toLowerCase() : ''}" 
                 th:data-tipo="${producto.tipo != null ? producto.tipo.toLowerCase() : ''}"
                 th:data-nombre="${producto.nombre != null ? producto.nombre.toLowerCase() : ''}">
                
                <a th:href="@{/producto/{id}(id=${producto.idReferencia})}" class="text-decoration-none text-reset">
                    <div class="card h-100 border-0 shadow-sm overflow-hidden product-card position-relative">
                        <button type="button" class="btn-favorito position-absolute"
                                style="top: 12px; right: 12px; z-index: 5; width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.9); box-shadow: 0 2px 8px rgba(0,0,0,0.15);"
                                th:attr="data-producto-id=${producto.idReferencia}"
                                th:classappend="${idsFavoritos != null and idsFavoritos.contains(producto.idReferencia)} ? 'es-favorito' : ''"
                                onclick="alternarFavorito(event, this)">
                            <i class="bi" th:classappend="${idsFavoritos != null and idsFavoritos.contains(producto.idReferencia)} ? 'bi-heart-fill text-danger' : 'bi-heart text-dark'"></i>
                        </button>
                        <div class="overflow-hidden">
                            <img th:src="${producto.imagenUrl}" class="card-img-top" style="height: 350px; object-fit: cover;" alt="Ropa">
                        </div>
                        <div class="card-body text-center d-flex flex-column">
                            <h5 class="fw-bold mb-1" th:text="${producto.nombre}">Nombre</h5>
                            <p class="text-muted small mb-2" th:text="${producto.description}">Descripción</p>
                            <div class="d-flex justify-content-center flex-wrap gap-1 mb-3">
                                <span th:each="t : ${producto.tallas}"
                                      class="badge rounded-pill"
                                      th:classappend="${t.disponible} ? 'bg-light text-dark border' : 'bg-light text-muted border text-decoration-line-through'"
                                      th:text="${t.talla}">S</span>
                            </div>
                            <h4 class="fw-bold text-danger mt-auto mb-3" th:text="'S/ ' + ${#numbers.formatDecimal(producto.precio, 1, 2)}">S/ 0.00</h4>
                            <span class="btn btn-dark rounded-pill px-4 w-100">
                                <i class="bi bi-eye"></i> Ver tallas
                            </span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-center align-items-center gap-3 mb-5">
        <button class="btn btn-sm btn-outline-dark rounded-pill px-3" onclick="cambiarPaginaCatalogo(-1)"><i class="bi bi-chevron-left"></i> Anterior</button>
        <span class="text-muted small" id="infoPaginaCatalogo"></span>
        <button class="btn btn-sm btn-outline-dark rounded-pill px-3" onclick="cambiarPaginaCatalogo(1)">Siguiente <i class="bi bi-chevron-right"></i></button>
    </div>

    <script>
        const TAMANO_PAGINA_CATALOGO = 12;
        let paginaActualCatalogo = 0;

        function filtrar() {
            paginaActualCatalogo = 0; // cada vez que cambia el filtro, volvemos a la primera página
            actualizarVistaCatalogo();
        }

        function cambiarPaginaCatalogo(delta) {
            paginaActualCatalogo += delta;
            if (paginaActualCatalogo < 0) paginaActualCatalogo = 0;
            actualizarVistaCatalogo();
        }

        function actualizarVistaCatalogo() {
            const generoSel = document.getElementById('filtroGenero').value.toLowerCase();
            const tipoSel = document.getElementById('filtroTipo').value.toLowerCase();
            const busqueda = document.getElementById('buscadorNombre').value.trim().toLowerCase();
            const todasLasCards = document.querySelectorAll('.producto-card');

            // 1. Filtramos primero, para saber cuáles "cuentan" para la paginación
            const coincidentes = [];
            todasLasCards.forEach(card => {
                const g = card.getAttribute('data-genero') || '';
                const t = card.getAttribute('data-tipo') || '';
                const n = card.getAttribute('data-nombre') || '';
                const matchGenero = (generoSel === 'todos' || g.includes(generoSel));
                const matchTipo = (tipoSel === 'todos' || t.includes(tipoSel));
                const matchNombre = (busqueda === '' || n.includes(busqueda));

                if (matchGenero && matchTipo && matchNombre) coincidentes.push(card);
                else card.style.display = 'none';
            });

            // 2. Paginamos solo dentro de lo que coincide con el filtro
            const totalPaginas = Math.max(1, Math.ceil(coincidentes.length / TAMANO_PAGINA_CATALOGO));
            paginaActualCatalogo = Math.min(paginaActualCatalogo, totalPaginas - 1);
            const inicio = paginaActualCatalogo * TAMANO_PAGINA_CATALOGO;

            coincidentes.forEach((card, indice) => {
                card.style.display = (indice >= inicio && indice < inicio + TAMANO_PAGINA_CATALOGO) ? 'block' : 'none';
            });

            document.getElementById('infoPaginaCatalogo').textContent =
                coincidentes.length === 0 ? 'Sin resultados' : `Página ${paginaActualCatalogo + 1} de ${totalPaginas}`;
        }

        actualizarVistaCatalogo();

        function alternarFavorito(event, boton) {
            event.preventDefault();
            event.stopPropagation();

            const productoId = boton.getAttribute('data-producto-id');
            fetch(`/favoritos/${productoId}/alternar`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.requiereLogin) {
                        window.location.href = '/login';
                        return;
                    }
                    const icono = boton.querySelector('i');
                    if (data.favorito) {
                        boton.classList.add('es-favorito');
                        icono.classList.remove('bi-heart', 'text-dark');
                        icono.classList.add('bi-heart-fill', 'text-danger');
                    } else {
                        boton.classList.remove('es-favorito');
                        icono.classList.remove('bi-heart-fill', 'text-danger');
                        icono.classList.add('bi-heart', 'text-dark');
                    }
                })
                .catch(() => {}); // si falla la red, simplemente no cambia el ícono
        }
    </script>

    <script th:if="${tipoPreseleccionado}" th:inline="javascript">
        document.getElementById('filtroTipo').value = /*[[${tipoPreseleccionado}]]*/ 'todos';
        filtrar();
    </script>

    <footer class="text-center py-4 mt-auto border-top" style="background-color: #2C1A17; color: #FCF9F2 !important;">
        <p class="mb-0">© 2026 JVXF Boutique - Todos los derechos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
