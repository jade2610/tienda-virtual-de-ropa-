<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <nav class="navbar bg-white shadow-sm mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" th:href="@{/catalogo}">
                <i class="bi bi-arrow-left me-2"></i> Volver al catálogo
            </a>
            <a class="nav-link text-dark fw-bold" th:href="@{/logout}">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
            </a>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 600px;">

        <div class="text-center mb-4">
            <i class="bi bi-person-circle fs-1 text-muted"></i>
            <h3 class="fw-bold mt-2" th:text="${cliente.nombre}">Nombre</h3>
            <p class="text-muted" th:text="${cliente.email}">correo@ejemplo.com</p>
        </div>

        <div class="card border-0 shadow-sm p-4 mb-4">
            <a th:href="@{/mis-pedidos}" class="d-flex justify-content-between align-items-center text-decoration-none text-dark mb-3 pb-3 border-bottom">
                <span><i class="bi bi-bag-check me-2"></i> Mis pedidos</span>
                <i class="bi bi-chevron-right"></i>
            </a>
            <a th:href="@{/favoritos}" class="d-flex justify-content-between align-items-center text-decoration-none text-dark">
                <span><i class="bi bi-heart me-2"></i> Mis favoritos</span>
                <i class="bi bi-chevron-right"></i>
            </a>
        </div>

        <div class="card border-0 shadow-sm p-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-shield-lock"></i> Cambiar contraseña</h5>

            <div th:if="${mensaje}" class="alert alert-success small py-2" th:text="${mensaje}"></div>
            <div th:if="${error}" class="alert alert-danger small py-2" th:text="${error}"></div>

            <form th:action="@{/perfil/cambiar-password}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Contraseña actual</label>
                    <input type="password" class="form-control" name="passwordActual" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">Nueva contraseña</label>
                    <input type="password" class="form-control" name="passwordNueva" minlength="6" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small">Confirmar nueva contraseña</label>
                    <input type="password" class="form-control" name="passwordNuevaConfirmar" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 rounded-pill py-2">Actualizar contraseña</button>
            </form>
        </div>

    </div>

</body>
</html>
