<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <div class="sidebar">
        <div class="text-center pb-4 mb-4 border-bottom" style="border-color: rgba(240, 213, 215, 0.2) !important;">
            <h4 class="fw-bold mb-0 text-white" style="letter-spacing: 1px;">JVXF Panel</h4>
            <small class="text-muted fw-bold">ADMINISTRADOR</small>
        </div>
        <ul class="nav flex-column fs-6">
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" th:href="@{/productos}"><i class="bi bi-list-ul me-2"></i> Ver Inventario</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/productos/nuevo}"><i class="bi bi-plus-circle me-2"></i> Registrar Ropa</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/ventas}"><i class="bi bi-receipt me-2"></i> Historial Ventas</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/clientes}"><i class="bi bi-people me-2"></i> Base Clientes</a></li>
            <li class="nav-item mt-5 border-top" style="border-color: rgba(240, 213, 215, 0.2) !important;"><a class="nav-link text-warning" th:href="@{/}"><i class="bi bi-box-arrow-left me-2"></i> Salir al Catálogo</a></li>
        </ul>
    </div>

    <div class="main-content">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0" style="color: #422A26;">Inventario de Prendas</h2>
                <p class="text-muted small">Gestiona tu catálogo y stock actual</p>
            </div>
            <a th:href="@{/productos/nuevo}" class="btn btn-warning shadow-sm px-4">
                <i class="bi bi-plus-lg fw-bold me-1"></i> Nueva Prenda
            </a>
        </div>

        <div class="card border-0 shadow-sm p-4 mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="small fw-bold text-muted mb-1">Género</label>
                    <select id="filtroGenero" class="form-select" onchange="aplicarFiltros()">
                        <option value="">Todos los géneros</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Masculino">Masculino</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="small fw-bold text-muted mb-1">Tipo de Prenda</label>
                    <select id="filtroTipo" class="form-select" onchange="aplicarFiltros()">
                        <option value="">Todas las categorías</option>
                        <option value="Polos">Polos</option>
                        <option value="Pantalones">Pantalones</option>
                        <option value="Casacas">Casacas</option>
                        <option value="Sueteres">Suéteres</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="small fw-bold text-muted mb-1">Búsqueda Rápida</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
                        <input type="text" id="buscador" class="form-control border-start-0 ps-0" placeholder="Buscar por nombre o descripción..." onkeyup="aplicarFiltros()">
                    </div>
                </div>
            </div>
        </div>

        <div id="cuerpoTabla">
            <div th:each="p : ${listaProductos}" class="card border-0 shadow-sm p-4 mb-3 fila-producto"
                 th:attr="data-nombre=${p.nombre.toLowerCase()},data-genero=${p.genero != null ? p.genero.toLowerCase() : ''},data-tipo=${p.tipo != null ? p.tipo.toLowerCase() : ''}">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <img th:src="${p.imagenUrl}" class="rounded shadow-sm" style="width: 60px; height: 72px; object-fit: cover; border: 1px solid #F0D5D7;">
                    </div>
                    <div class="col">
                        <div class="fw-bold fs-6" style="color: #422A26;" th:text="${p.nombre}">Nombre Prenda</div>
                        <small class="text-muted" th:text="${p.tipo} + ' • ' + ${p.genero} + ' • S/ ' + ${#numbers.formatDecimal(p.precio, 1, 2)}">Tipo • Género • Precio</small>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{'/productos/nuevo?duplicarDe=' + ${p.tallas[0].id}}" class="btn btn-sm btn-outline-dark">
                            <i class="bi bi-plus-circle"></i> Agregar talla
                        </a>
                    </div>
                </div>

                <div class="table-responsive mt-3">
                    <table class="table table-sm align-middle mb-0">
                        <thead class="text-muted small text-uppercase" style="letter-spacing: 0.5px;">
                            <tr><th>Talla</th><th>Stock</th><th class="text-center">Acciones</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="t : ${p.tallas}">
                                <td><span class="badge bg-dark" th:text="${t.talla}"></span></td>
                                <td>
                                    <span class="badge" th:classappend="${t.stock < 5 ? 'bg-danger' : 'bg-success'}" th:text="${t.stock} + ' und'">0 und</span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{'/productos/editar/' + ${t.id}}" class="btn btn-sm btn-outline-dark me-1" title="Editar"><i class="bi bi-pencil"></i></a>
                                    <a th:href="@{'/productos/eliminar/' + ${t.id}}" class="btn btn-sm btn-outline-danger" title="Eliminar" onclick="return confirm('¿Eliminar esta talla del catálogo?');"><i class="bi bi-trash"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3 px-2">
            <span class="text-muted small" id="infoPaginaProductos"></span>
            <div>
                <button class="btn btn-sm btn-outline-dark" onclick="cambiarPaginaProductos(-1)"><i class="bi bi-chevron-left"></i> Anterior</button>
                <button class="btn btn-sm btn-outline-dark" onclick="cambiarPaginaProductos(1)">Siguiente <i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <script>
        const TAMANO_PAGINA_PRODUCTOS = 10;
        let paginaActualProductos = 0;

        function aplicarFiltros() {
            paginaActualProductos = 0; // cada vez que cambia el filtro, volvemos a la primera página
            actualizarVistaProductos();
        }

        function cambiarPaginaProductos(delta) {
            paginaActualProductos += delta;
            if (paginaActualProductos < 0) paginaActualProductos = 0;
            actualizarVistaProductos();
        }

        function actualizarVistaProductos() {
            const busqueda = document.getElementById("buscador").value.toLowerCase();
            const genSel = document.getElementById("filtroGenero").value.toLowerCase();
            const tipoSel = document.getElementById("filtroTipo").value.toLowerCase();
            const todasLasFilas = document.querySelectorAll(".fila-producto");

            // 1. Filtramos primero, para saber cuáles "cuentan" para la paginación
            const coincidentes = [];
            todasLasFilas.forEach(fila => {
                const nombre = fila.dataset.nombre || "";
                const genero = fila.dataset.genero || "";
                const tipo = fila.dataset.tipo || "";

                const coincide = nombre.includes(busqueda) &&
                               (genSel === "" || genero.includes(genSel)) &&
                               (tipoSel === "" || tipo.includes(tipoSel));

                if (coincide) coincidentes.push(fila);
                else fila.style.display = "none";
            });

            // 2. Paginamos solo dentro de lo que coincide con el filtro
            const totalPaginas = Math.max(1, Math.ceil(coincidentes.length / TAMANO_PAGINA_PRODUCTOS));
            paginaActualProductos = Math.min(paginaActualProductos, totalPaginas - 1);
            const inicio = paginaActualProductos * TAMANO_PAGINA_PRODUCTOS;

            coincidentes.forEach((fila, indice) => {
                fila.style.display = (indice >= inicio && indice < inicio + TAMANO_PAGINA_PRODUCTOS) ? "" : "none";
            });

            document.getElementById('infoPaginaProductos').textContent =
                coincidentes.length === 0 ? 'Sin resultados' : `Página ${paginaActualProductos + 1} de ${totalPaginas} (${coincidentes.length} prendas)`;
        }

        actualizarVistaProductos();
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
