<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body style="background: url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;">

    <div class="d-flex align-items-center justify-content-center w-100 h-100" style="background-color: rgba(66, 42, 38, 0.8); min-height: 100vh;">

        <div class="card border-0 shadow-lg p-5" style="max-width: 450px; width: 100%; border-radius: 20px;">

            <div class="text-center mb-4">
                <h3 class="fw-bold" style="color: #B23A48;">JVXF Boutique</h3>
                <p class="text-muted small fw-bold">RECUPERAR CONTRASEÑA</p>
            </div>

            <div th:if="${mensaje}" class="alert alert-success text-center small py-2" role="alert">
                <i class="bi bi-check-circle-fill"></i> <span th:text="${mensaje}"></span>
            </div>

            <p class="text-muted small" th:unless="${mensaje}">
                Ingresa el correo con el que accedes al panel de administración. Si es una cuenta válida,
                te enviaremos una contraseña temporal para que puedas entrar de nuevo.
            </p>

            <form th:action="@{/admin/recuperar}" method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold" style="color: #422A26;">Correo Corporativo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-color: #F0D5D7;">
                            <i class="bi bi-envelope text-muted"></i>
                        </span>
                        <input type="email" class="form-control border-start-0" name="email" placeholder="admin@jvxf.com" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-warning w-100 fs-5">
                    Enviar contraseña temporal <i class="bi bi-send"></i>
                </button>
            </form>

            <div class="text-center mt-4 pt-3 border-top">
                <a th:href="@{/admin/login}" class="text-decoration-none small text-muted">
                    <i class="bi bi-arrow-left"></i> Volver al login
                </a>
            </div>

        </div>
    </div>

</body>
</html>
