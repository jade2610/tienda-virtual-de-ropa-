# 1. Configuración de conexión a MySQL (XAMPP en local, Railway en producción)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/tienda_ropa?serverTimezone=UTC&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# 2. Configuración de JPA / Hibernate (Genera/Actualiza tablas automáticamente)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. Desactivar el caché de Thymeleaf para ver los cambios de diseño al instante
spring.thymeleaf.cache=false

# 4. Configuración de correo (Gmail SMTP)
# IMPORTANTE: no uses tu contraseña normal de Gmail. Genera una "contraseña de aplicación" en
# https://myaccount.google.com/apppasswords (requiere verificación en 2 pasos activada).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=aquinofencojhade@gmail.com
spring.mail.password=bpff giug axjs loxm
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Nombre de la tienda que aparece como remitente en los correos
tienda.nombre=JVXF Boutique

# 5. URL pública donde corre tu proyecto. Se usa para armar el link que va
# dentro del código QR de la boleta (ej: http://localhost:8080/pedido/12).
# Cuando subas el proyecto a un servidor real, cambia esto por tu dominio,
# por ejemplo: app.base-url=https://jvxfboutique.com
app.base-url=${APP_BASE_URL:http://localhost:8080}

# 6. Flyway: como tu base de datos YA existe (la armaste a mano), le decimos que
# trate lo que ya tienes como el "punto de partida" (baseline) y que solo aplique
# migraciones nuevas de aquí en adelante. Así no intenta recrear tablas que ya
# tienes ni borra nada existente.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
